{{ define "main" }}
  <article>
    <h1 style="margin-bottom: 10px;">{{ .Title }}</h1>
    <div style="font-size: 0.9em; color: var(--accent-color); margin-bottom: 40px;">
      {{ .Date.Format "2006-01-02" }}
    </div>
    
    <div class="content">
      {{ .Content }} </div>
  </article>
{{ end }}
